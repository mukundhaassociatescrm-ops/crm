<div class="login-wrapper">
    <div class="brand-watermark">MUKUNDHA</div>

    <div class="login-card" [class.animate]="animate">
        <div class="brand-block">
            <div class="brand-icon" aria-hidden="true">
                <i class="fa-solid fa-shield-halved"></i>
            </div>
            <h1 class="title">MUKUNDHA ASSOCIATES</h1>
            <p class="subtitle">Business Management Portal</p>
        </div>

        <ol class="step-progress" aria-label="Login steps">
            <li class="step-item" [class.active]="step === 'email'" [class.done]="step !== 'email'">
                <span class="step-dot">1</span>
                <span class="step-name">Verify Email</span>
            </li>
            <li class="step-item" [class.active]="step === 'password'">
                <span class="step-dot">2</span>
                <span class="step-name">Sign In</span>
            </li>
            <li class="step-item" [class.active]="step === 'set-password'">
                <span class="step-dot">3</span>
                <span class="step-name">Create Password</span>
            </li>
        </ol>

        <form *ngIf="step === 'email'" [formGroup]="emailForm" (ngSubmit)="checkEmail()">
            <div class="form-group">
                <label>Email Address</label>
                <div class="input-shell with-prefix">
                    <span class="input-prefix" aria-hidden="true">
                        <i class="fa-regular fa-envelope"></i>
                    </span>
                    <input
                        formControlName="email"
                        type="email"
                        placeholder="Enter your email address"
                        [disabled]="loading" />
                </div>
            </div>

            <div *ngIf="errorMessage" class="error-message">
                {{ errorMessage }}
            </div>

            <button
                type="submit"
                class="btn-login"
                [disabled]="loading || emailForm.invalid">
                <span *ngIf="!loading">Continue</span>
                <span *ngIf="loading" class="loader">Checking...</span>
                <i *ngIf="!loading" class="fa-solid fa-arrow-right"></i>
            </button>
        </form>

        <form *ngIf="step === 'password'" [formGroup]="passwordForm" (ngSubmit)="login()">
            <button type="button" class="back-btn" (click)="goBack()" [disabled]="loading">
                <i class="fa-solid fa-arrow-left"></i>
                Back
            </button>

            <div class="user-info">
                <p>{{ userEmail }}</p>
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="input-shell password-wrapper">
                    <input
                        formControlName="password"
                        [type]="showPassword ? 'text' : 'password'"
                        placeholder="Enter your password"
                        [disabled]="loading" />
                    <span class="toggle-icon" (click)="togglePassword()" role="button" tabindex="0">
                        <i class="fa-solid" [ngClass]="showPassword ? 'fa-eye-slash' : 'fa-eye'"></i>
                    </span>
                </div>
            </div>

            <div *ngIf="errorMessage" class="error-message">
                {{ errorMessage }}
            </div>

            <button
                type="submit"
                class="btn-login"
                [disabled]="loading || passwordForm.invalid">
                <span *ngIf="!loading">Sign In</span>
                <span *ngIf="loading" class="loader">Signing in...</span>
                <i *ngIf="!loading" class="fa-solid fa-arrow-right-to-bracket"></i>
            </button>

            <div class="forgot">
                <a href="#">Forgot Password?</a>
            </div>
        </form>

        <form *ngIf="step === 'set-password'" class="login-step-form" [formGroup]="setPasswordForm" (ngSubmit)="setPassword()">
            <div class="login-step-form__scroll">
                <button type="button" class="back-btn" (click)="goBack()" [disabled]="loading">
                    <i class="fa-solid fa-arrow-left"></i>
                    Back
                </button>

                <div class="user-info">
                    <p>{{ userEmail }}</p>
                    <p class="info-text">This is your first time? Create a password to continue.</p>
                </div>

                <div class="form-group">
                    <label>New Password</label>
                    <div class="input-shell password-wrapper">
                        <input
                            formControlName="password"
                            [type]="showPassword ? 'text' : 'password'"
                            placeholder="Create a password (min. 5 characters)"
                            [disabled]="loading" />
                        <span class="toggle-icon" (click)="togglePassword()" role="button" tabindex="0">
                            <i class="fa-solid" [ngClass]="showPassword ? 'fa-eye-slash' : 'fa-eye'"></i>
                        </span>
                    </div>
                </div>

                <div class="form-group">
                    <label>Confirm Password</label>
                    <div class="input-shell password-wrapper">
                        <input
                            formControlName="confirmPassword"
                            [type]="showPassword ? 'text' : 'password'"
                            placeholder="Confirm your password"
                            [disabled]="loading" />
                        <span class="toggle-icon" (click)="togglePassword()" role="button" tabindex="0">
                            <i class="fa-solid" [ngClass]="showPassword ? 'fa-eye-slash' : 'fa-eye'"></i>
                        </span>
                    </div>
                </div>

                <div *ngIf="errorMessage" class="error-message">
                    {{ errorMessage }}
                </div>
            </div>

            <div class="login-step-form__footer">
                <button
                    type="submit"
                    class="btn-login"
                    [disabled]="loading || setPasswordForm.invalid">
                    <span *ngIf="!loading">Create Account</span>
                    <span *ngIf="loading" class="loader">Creating account...</span>
                    <i *ngIf="!loading" class="fa-solid fa-arrow-right"></i>
                </button>
            </div>
        </form>
    </div>
</div>
