<div class="login-wrapper">
  <div class="brand-watermark">MUKUNDHA</div>

  <div class="login-card animate">
    <div class="brand-block">
      <div class="brand-icon" aria-hidden="true">
        <i class="fa-solid fa-key"></i>
      </div>
      <h1 class="title">Create Password</h1>
      <p class="subtitle">Set a new password to continue</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="login-step-form">
      <div class="login-step-form__scroll">
        <div class="user-info">
          <p>{{ email }}</p>
          <p class="info-text">Your administrator requested a password reset. Choose a new password below.</p>
        </div>

        <div class="form-group">
          <label>New Password</label>
          <div class="input-shell password-wrapper">
            <input
              formControlName="password"
              [type]="showPassword ? 'text' : 'password'"
              placeholder="Create a password (min. 5 characters)"
              [disabled]="loading" />
            <span class="toggle-icon" (click)="togglePassword()" role="button" tabindex="0">
              <i class="fa-solid" [ngClass]="showPassword ? 'fa-eye-slash' : 'fa-eye'"></i>
            </span>
          </div>
        </div>

        <div class="form-group">
          <label>Confirm Password</label>
          <div class="input-shell password-wrapper">
            <input
              formControlName="confirmPassword"
              [type]="showPassword ? 'text' : 'password'"
              placeholder="Confirm your password"
              [disabled]="loading" />
            <span class="toggle-icon" (click)="togglePassword()" role="button" tabindex="0">
              <i class="fa-solid" [ngClass]="showPassword ? 'fa-eye-slash' : 'fa-eye'"></i>
            </span>
          </div>
        </div>

        <div *ngIf="errorMessage" class="error-message">
          {{ errorMessage }}
        </div>
      </div>

      <div class="login-step-form__footer">
        <button type="submit" class="btn-login" [disabled]="loading || form.invalid">
          <span *ngIf="!loading">Create Password</span>
          <span *ngIf="loading" class="loader">Updating...</span>
          <i *ngIf="!loading" class="fa-solid fa-arrow-right"></i>
        </button>
        <button type="button" class="back-link-btn" (click)="goToLogin()" [disabled]="loading">
          Back to login
        </button>
      </div>
    </form>
  </div>
</div>
