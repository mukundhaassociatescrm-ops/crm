<div class="manage-report-shell page-workspace">
  <app-fullscreen-toggle pageKey="manage-report"></app-fullscreen-toggle>
  <div class="top-actions" *ngIf="mode !== 'list'">
    <button type="button" class="back-btn" (click)="backToList()">Back to Reports</button>
    <button
      *ngIf="mode === 'view' && selectedReport"
      type="button"
      class="download-btn"
      (click)="onDownload(selectedReport)">
      Download PDF
    </button>
  </div>

  <app-report-list
    *ngIf="mode === 'list'"
    [reports]="reports"
    [loading]="loading"
    (create)="openCreate()"
    (view)="openView($event)"
    (edit)="openEdit($event)"
    (remove)="onDelete($event)"
    (download)="onDownload($event)">
  </app-report-list>

  <app-report-form
    *ngIf="mode !== 'list'"
    [initialReport]="selectedReport"
    [viewMode]="mode === 'view'"
    [editMode]="mode === 'edit'"
    [defaultBankDetails]="companyBankDetails"
    (save)="onSave($event)"
    (cancel)="backToList()">
  </app-report-form>
</div>
