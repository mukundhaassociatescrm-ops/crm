# ================================================================
# Nginx configuration for MUKUNDHA ASSOCIATES CRM
# Place this file at: /etc/nginx/sites-available/mukundhaassociates
# Then: sudo ln -s /etc/nginx/sites-available/mukundhaassociates /etc/nginx/sites-enabled/
# Reload: sudo nginx -s reload
#
# Coolify note: "no available server" on mukundhaassociates.com means Traefik has
# NO application FQDN for that host. Add the domain to your frontend service in
# Coolify (same app as crm.mukundhaassociates.com) or redirect apex -> crm.
# ================================================================

# --- Marketing site (apex) — poster landings + optional Angular SPA ---
# Required if you use https://mukundhaassociates.com in poster/SMS links.
server {
    listen 80;
    listen 443 ssl;
    server_name mukundhaassociates.com www.mukundhaassociates.com;

    ssl_certificate     /etc/letsencrypt/live/mukundhaassociates.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mukundhaassociates.com/privkey.pem;

    # Public poster pages (served by Node API — works without SPA deploy)
    location /posters/ {
        proxy_pass         https://api.mukundhaassociates.com;
        proxy_http_version 1.1;
        proxy_set_header   Host api.mukundhaassociates.com;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # CRM Angular app (if hosted on same host) or redirect to crm subdomain
    root /var/www/crm-app/front-end/dist/front-end/browser;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# --- Frontend (Angular CRM) ---
server {
    listen 80;
    listen 443 ssl;
    server_name crm.mukundhaassociates.com;

    # SSL certificates (replace with your actual cert paths)
    ssl_certificate     /etc/letsencrypt/live/crm.mukundhaassociates.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/crm.mukundhaassociates.com/privkey.pem;

    root /var/www/crm-app/front-end/dist/front-end/browser;
    index index.html;

    # Angular app — serve index.html for all routes (required for /posters/:slug, /login, etc.)
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# --- Backend API + public poster HTML + Socket.IO ---
server {
    listen 80;
    listen 443 ssl;
    server_name api.mukundhaassociates.com;

    # SSL certificates
    ssl_certificate     /etc/letsencrypt/live/api.mukundhaassociates.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.mukundhaassociates.com/privkey.pem;

    # Public poster landing pages (HTML)
    location /posters/ {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # REST API routes
    location /api {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Uploaded files
    location /uploads {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # Socket.IO — MUST have Upgrade headers for WebSocket support
    location /socket.io/ {
        proxy_pass             http://127.0.0.1:5000;
        proxy_http_version     1.1;

        # WebSocket upgrade headers (required — missing these causes the console errors)
        proxy_set_header       Upgrade $http_upgrade;
        proxy_set_header       Connection "upgrade";

        proxy_set_header       Host $host;
        proxy_set_header       X-Real-IP $remote_addr;
        proxy_set_header       X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;

        proxy_read_timeout     86400;
        proxy_send_timeout     86400;
        proxy_buffering        off;
    }
}
